## STEP 2 — Understanding What You Just Wrote

### The Structure
```
pipeline.yml
│
├── on: push to main     ← WHEN to run
│
└── jobs:
    ├── test             ← JOB 1: run pytest
    │     └── needs: nothing (runs first)
    │
    ├── security-scan    ← JOB 2: secrets + Snyk
    │     └── needs: test (only runs if tests pass)
    │
    └── docker-build-scan ← JOB 3: Docker + Trivy
          └── needs: security-scan (only runs if scan passes)