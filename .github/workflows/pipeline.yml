# ─────────────────────────────────────────
# SecureNet Pipeline — CI/CD Pipeline
# Runs automatically on every push to main
# ─────────────────────────────────────────

name: SecureNet CI Pipeline

# WHEN does this pipeline run?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# WHAT jobs does it run?
jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Run Tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Download your code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3 — Install your dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4 — Run your pytest tests
      # If any test fails — pipeline stops here
      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # JOB 2 — Security Scan
  # Only runs AFTER tests pass
  # ─────────────────────────────────────────
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: test  # wait for test job to pass first

    steps:
      # Step 1 — Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Scan your code for secrets
      # Checks if you accidentally committed passwords or API keys
      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3 — Install Python + dependencies
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4 — Run Snyk to scan Python dependencies
      # Checks if any library you use has known CVEs
      - name: Run Snyk dependency scan
        uses: snyk/actions/python@master
        continue-on-error: true  # don't fail pipeline on first run
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ─────────────────────────────────────────
  # JOB 3 — Build and Scan Docker Image
  # Only runs AFTER security scan passes
  # ─────────────────────────────────────────
  docker-build-scan:
    name: 🐳 Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: security-scan  # wait for security scan first

    steps:
      # Step 1 — Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Build your Docker image
      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t securenet:latest .

      # Step 3 — Run Trivy on the built image
      # Same scan you ran manually on Day 3
      # Now it runs automatically on every push
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'securenet:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # set to 1 to fail pipeline on findings

      # Step 4 — Save Trivy report as an artifact
      # You can download this report from GitHub after each run
      - name: Save Trivy report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'securenet:latest'
          format: 'json'
          output: 'reports/trivy-report.json'
          severity: 'CRITICAL,HIGH'

      # Step 5 — Upload report so you can download it from GitHub
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: reports/trivy-report.json
```

